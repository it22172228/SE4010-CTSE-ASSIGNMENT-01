name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user-service, restaurant-service, order-service, notification-service]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies and lint/test
      working-directory: ./services/${{ matrix.service }}
      run: |
        npm ci
        npm run lint --if-present
        npm test --if-present

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Build Docker image
      working-directory: ./services/${{ matrix.service }}
      run: |
        IMAGE=ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
        docker build -t $IMAGE .
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE }}
        format: 'table'

    - name: Push image to GHCR
      run: docker push ${{ env.IMAGE }}

    - name: Optional: Snyk test (if SNYK_TOKEN provided)
      if: ${{ secrets.SNYK_TOKEN != '' }}
      uses: snyk/actions/node@master
      with:
        command: test
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
